<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PUBG Death Note</title>
  <link rel="stylesheet" href="/css/style.css?v=5">
</head>

<body>
  <div class="container">
    <h1>PUBG DEATH NOTE</h1>
    <div class="subtitle" id="subtitle"></div>

    <div class="tabs" id="tabs">
      <button class="tab active" data-tab="deathnote">死亡笔记</button>
      <button class="tab" data-tab="victim">我被TA或TA被我击杀过吗？</button>
    </div>

    <div class="panel active" id="panel-deathnote">
      <div id="deathnote-search">
        <div class="form-group">
          <label>玩家昵称</label>
          <input type="text" id="deathnote-nickname" placeholder="输入PUBG昵称">
        </div>
        <button class="btn" id="btn-deathnote" onclick="queryDeathNote()">查询</button>
      </div>

      <button class="toggle-calendar-btn" id="toggleCalendarBtn" onclick="toggleCalendar()" style="display: none;">
        <span class="calendar-icon">📅</span>
        <span>选择日期</span>
      </button>

      <div class="calendar-section" id="calendarSection">
        <div class="calendar-header">
          <button class="calendar-nav-btn" onclick="calendarPrev()">◀</button>
          <span class="calendar-title" id="calendarTitle" onclick="toggleCalendarExpand()"></span>
          <button class="calendar-nav-btn" onclick="calendarNext()">▶</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </div>

      <div id="shareLink" class="share-link" style="display: none;">
        <div class="share-link-text">专属链接（点击复制）</div>
        <div class="share-link-url" id="shareLinkUrl" onclick="copyShareLink()"></div>
      </div>

      <div class="result" id="result-deathnote"></div>
    </div>

    <div class="panel" id="panel-victim">
      <div class="victim-guide">
        <div class="guide-icon">🎯</div>
        <div class="guide-text" id="guideText">输入你的昵称和对方昵称，看看你们之间的击杀记录！</div>
      </div>
      <div class="form-group">
        <label>你的昵称</label>
        <input type="text" id="victim-nickname" placeholder="输入你的PUBG昵称">
      </div>
      <div class="form-group">
        <label>对方昵称</label>
        <input type="text" id="victim-target" placeholder="输入对方PUBG昵称">
      </div>
      <button class="btn" id="btn-victim" onclick="queryVictimHistory()">查询</button>
      <div class="result" id="result-victim"></div>
    </div>
  </div>

  <script src="/js/app.js?v=5"></script>
</body>

</html>
